name: Android APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate tag matches project version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          APP_VERSION_NAME=$(tr -d '\n' < ../version.txt)
          EXPECTED_TAG="v${APP_VERSION_NAME}"

          if [ -z "$APP_VERSION_NAME" ]; then
            echo "Failed to read version from version.txt" >&2
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match project version $EXPECTED_TAG" >&2
            exit 1
          fi

          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$EXPECTED_TAG" >> "$GITHUB_ENV"

      - name: Restore google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "GOOGLE_SERVICES_JSON_B64 secret is not set" >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/google-services.json

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p .keystore
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > .keystore/release.jks

      - name: Build signed release APK
        env:
          ANDROID_API_BASE_URL: ""
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/.keystore/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ env.APP_VERSION_NAME }}
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "Android APK $APP_VERSION_NAME" \
            --notes "Release generated from project version $APP_VERSION_NAME." \
            app/build/outputs/apk/release/app-release.apk
