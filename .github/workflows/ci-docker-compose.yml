name: CI (docker compose build)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)build images for, e.g. v1.2.9'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref_type == 'tag'
        && startsWith(github.ref_name, 'v'))
      || (github.event_name == 'workflow_dispatch'
        && startsWith(inputs.tag, 'v'))
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      BUILDKIT_PROGRESS: plain
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve checked-out commit SHA
        id: sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      - name: Cache BuildKit
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: ~/.cache/buildx
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile', 'docker-compose.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build all services via docker compose
        env:
          IMAGE_REGISTRY: ghcr.io/turtleold/task_manager
          IMAGE_TAG: ${{ steps.sha.outputs.value }}
        run: docker compose build --pull backend celery frontend

      - name: Push images to GHCR
        env:
          IMAGE_REGISTRY: ghcr.io/turtleold/task_manager
          IMAGE_TAG: ${{ steps.sha.outputs.value }}
        run: docker compose push backend celery frontend

      - name: Tag and push release aliases
        env:
          IMAGE_REGISTRY: ghcr.io/turtleold/task_manager
          SHA_TAG: ${{ steps.sha.outputs.value }}
        run: |
          set -euo pipefail
          for img in backend celery frontend; do
            if ! docker image inspect "$IMAGE_REGISTRY/$img:$SHA_TAG" >/dev/null 2>&1; then
              echo "Skip $img: image $IMAGE_REGISTRY/$img:$SHA_TAG not found"
              continue
            fi
            docker tag "$IMAGE_REGISTRY/$img:$SHA_TAG" "$IMAGE_REGISTRY/$img:$RELEASE_TAG"
            docker push "$IMAGE_REGISTRY/$img:$RELEASE_TAG"
            docker tag "$IMAGE_REGISTRY/$img:$SHA_TAG" "$IMAGE_REGISTRY/$img:latest"
            docker push "$IMAGE_REGISTRY/$img:latest"
          done
