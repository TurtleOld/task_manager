name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  backend:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Sync deps with uv (with cache)
        run: |
          uv venv
          uv sync --all-extras
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type check (mypy)
        run: uv run mypy src
      - name: Tests with coverage (pytest)
        env:
          DJANGO_SECRET_KEY: test
          DJANGO_DEBUG: 'true'
          DATABASE_URL: sqlite:///${{ github.workspace }}/backend/test.sqlite3
        run: uv run pytest --cov=src/kanban --cov-report=term-missing --cov-report=xml
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: |
          npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck

  e2e:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Sync backend deps
        working-directory: backend
        run: |
          uv venv
          uv sync --all-extras
      - name: Migrate e2e database
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test
          DJANGO_DEBUG: 'true'
          DATABASE_URL: sqlite:///${{ github.workspace }}/backend/e2e.sqlite3
          CELERY_TASK_ALWAYS_EAGER: 'true'
        run: uv run python manage.py migrate --noinput
      - name: Start backend
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: test
          DJANGO_DEBUG: 'true'
          DATABASE_URL: sqlite:///${{ github.workspace }}/backend/e2e.sqlite3
          CELERY_TASK_ALWAYS_EAGER: 'true'
          FRONTEND_BASE_URL: http://127.0.0.1:5173
        run: |
          uv run python manage.py runserver 127.0.0.1:8000 > ../backend-e2e.log 2>&1 &
          for i in {1..60}; do
            if curl -fsSL http://127.0.0.1:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat ../backend-e2e.log
          exit 1
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000/api/v1
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_BACKEND_ORIGIN: http://127.0.0.1:8000
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report

  android:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Restore google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "GOOGLE_SERVICES_JSON_B64 secret is not set" >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/google-services.json
      - name: Android lint
        env:
          ANDROID_API_BASE_URL: ""
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
        run: ./gradlew :app:lintDebug -Pandroid.lint.baselines.continue=true
      - name: Android compile
        env:
          ANDROID_API_BASE_URL: ""
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
        run: ./gradlew :app:compileDebugKotlin
