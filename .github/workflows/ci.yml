name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  backend:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Sync deps with uv (with cache)
        run: |
          uv venv
          uv sync --all-extras
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type check (mypy)
        run: uv run mypy src
      - name: Tests (pytest)
        env:
          DJANGO_SECRET_KEY: test
          DJANGO_DEBUG: 'true'
          DATABASE_URL: sqlite:///$(pwd)/test.sqlite3
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: |
          npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck

  android:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Restore google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "GOOGLE_SERVICES_JSON_B64 secret is not set" >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/google-services.json
      - name: Android lint
        env:
          ANDROID_API_BASE_URL: ""
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
        run: ./gradlew :app:lintDebug -Pandroid.lint.baselines.continue=true
      - name: Android compile
        env:
          ANDROID_API_BASE_URL: ""
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
        run: ./gradlew :app:compileDebugKotlin
